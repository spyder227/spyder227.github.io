<h1>Count Words</h1>
<form data-form="count-words">
    <label class="fullWidth">
        <b>Words</b>
        <span><textarea type="text" id="words" placeholder="Words"></textarea></span>
    </label>
    <div class="result fullWidth"></div>
    <button type="button" onClick="countWords(this)" class="fullWidth">Submit</button>
</form>
